<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>트렌드핏 — 결과</title>
<style>
  * { box-sizing:border-box; }
  body { font-family:-apple-system,"Apple SD Gothic Neo",sans-serif; background:#f6f7f9; color:#1a1a2e; margin:0; }
  .top { background:#5b21b6; color:#fff; padding:16px 24px; display:flex; align-items:center; justify-content:space-between; }
  .top a { color:#ddd6fe; font-size:14px; text-decoration:none; }
  section { max-width:1100px; margin:0 auto; padding:24px 16px; }
  h2 { font-size:20px; margin:0 0 4px; }
  .sub { color:#6b7280; font-size:14px; margin:0 0 16px; }
  iframe { width:100%; height:1400px; border:1px solid #e5e7eb; border-radius:12px; background:#fff; }
  .design-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(240px,1fr)); gap:16px; }
  .design-card { background:#fff; border:1px solid #e5e7eb; border-radius:12px; overflow:hidden; }
  .ph { aspect-ratio:3/4; background:repeating-linear-gradient(45deg,#eef0f3,#eef0f3 12px,#e6e8ec 12px,#e6e8ec 24px); display:flex; align-items:center; justify-content:center; color:#9ca3af; font-size:13px; text-align:center; padding:12px; }
  .design-card .body { padding:12px 14px; }
  .rank { display:inline-block; background:#ede9fe; color:#5b21b6; font-size:11px; font-weight:700; padding:2px 8px; border-radius:20px; }
  .tname { font-weight:700; font-size:14px; margin:8px 0 4px; }
  .kw { color:#6b7280; font-size:12px; }
  .note { background:#fff7ed; border:1px solid #fed7aa; color:#9a3412; font-size:13px; padding:12px 14px; border-radius:10px; margin-bottom:16px; }
</style>
</head>
<body>
  <div class="top">
    <strong>트렌드핏 결과</strong>
    <a href="/">← 새 입력으로</a>
  </div>

  <section>
    <h2>① 마케팅 리포트</h2>
    <p class="sub">작성가가 생성한 최신 리포트입니다.</p>
    <iframe src="/docs/report-mockup.html"></iframe>
  </section>

  <section>
    <h2>② 예상 시안</h2>
    <p class="sub">추천 트렌드별 콘텐츠 시안입니다.</p>
    <div class="note">⚠️ 지금은 <b>placeholder(자리표시)</b> 이미지예요. 실제 이미지 생성은 Google(Gemini) API 키를 추가하면 켜집니다.</div>
    <div class="design-grid" id="grid">
      <p style="color:#9ca3af">시안 데이터를 불러오는 중…</p>
    </div>
  </section>

<script>
(async () => {
  const grid = document.getElementById("grid");
  try {
    const res = await fetch("/output-main/output-text/writer-output.json?ts=" + Date.now());
    const json = await res.json();
    const contents = (json.data && json.data.contents) || [];
    if (!contents.length) { grid.innerHTML = "<p style='color:#9ca3af'>표시할 시안이 없어요.</p>"; return; }

    grid.innerHTML = contents.map((c) => {
      const kws = (c.keywords || []).slice(0, 3).join(" · ");
      return `
        <div class="design-card">
          <div class="ph">예상 시안<br/>(placeholder)</div>
          <div class="body">
            <span class="rank">${c.verdict || ("#" + (c.rank ?? ""))}</span>
            <div class="tname">${c.trend_name || c.content_id || ""}</div>
            <div class="kw">${kws}</div>
          </div>
        </div>`;
    }).join("");
  } catch (e) {
    grid.innerHTML = "<p style='color:#ef4444'>시안 데이터 로드 실패: " + e + "</p>";
  }
})();
</script>
</body>
</html>
