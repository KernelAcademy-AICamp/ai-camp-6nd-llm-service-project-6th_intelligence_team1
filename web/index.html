<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>트렌드핏 — 브랜드 입력</title>
<style>
  * { box-sizing: border-box; }
  body { font-family: -apple-system, "Apple SD Gothic Neo", sans-serif; background:#f6f7f9; color:#1a1a2e; margin:0; padding:40px 16px; }
  .wrap { max-width: 680px; margin:0 auto; }
  h1 { font-size:24px; margin:0 0 4px; }
  .sub { color:#6b7280; font-size:14px; margin:0 0 24px; }
  .card { background:#fff; border:1px solid #e5e7eb; border-radius:14px; padding:24px; }
  label { display:block; font-size:13px; font-weight:600; margin:14px 0 6px; }
  .hint { font-weight:400; color:#9ca3af; font-size:12px; }
  input, select { width:100%; padding:10px 12px; border:1px solid #d1d5db; border-radius:8px; font-size:14px; }
  .row { display:flex; gap:12px; }
  .row > div { flex:1; }
  button { margin-top:24px; width:100%; padding:14px; background:#5b21b6; color:#fff; border:none; border-radius:10px; font-size:16px; font-weight:700; cursor:pointer; }
  button:disabled { background:#a78bda; cursor:not-allowed; }
  #status { margin-top:20px; display:none; }
  .bar { background:#ede9fe; border:1px solid #ddd6fe; border-radius:10px; padding:16px; font-size:14px; }
  .spin { display:inline-block; width:14px; height:14px; border:2px solid #c4b5fd; border-top-color:#5b21b6; border-radius:50%; animation:s 0.8s linear infinite; vertical-align:-2px; margin-right:8px; }
  @keyframes s { to { transform: rotate(360deg); } }
  pre { background:#1e1e2e; color:#cdd6f4; padding:12px; border-radius:8px; font-size:11px; max-height:200px; overflow:auto; margin-top:10px; white-space:pre-wrap; }
</style>
</head>
<body>
<div class="wrap">
  <h1>트렌드핏 — 브랜드 입력</h1>
  <p class="sub">입력값을 넣고 실행하면 브랜드분석 → 트렌드 → 매칭 → 리포트까지 한 번에 돌립니다. (몇 분 소요)</p>

  <div class="card">
    <form id="f">
      <label>브랜드명</label>
      <input name="brand_name" value="힌스 (hince)" required />

      <label>제품명</label>
      <input name="product_name" value="커버 마스터 핑크 쿠션" required />

      <label>카테고리</label>
      <input name="category" value="메이크업 > 베이스 > 쿠션" />

      <div class="row">
        <div>
          <label>텍스처 <span class="hint">(콤마로 구분)</span></label>
          <input name="texture_keywords" value="매트" />
        </div>
        <div>
          <label>톤앤매너 <span class="hint">(콤마로 구분)</span></label>
          <input name="tone_and_manner" value="Z세대·트렌디" />
        </div>
      </div>

      <div class="row">
        <div>
          <label>타겟 성별</label>
          <select name="target_gender">
            <option>여성</option><option>남성</option><option>전체</option>
          </select>
        </div>
        <div>
          <label>타겟 연령 <span class="hint">(콤마)</span></label>
          <input name="target_age_groups" value="20대" />
        </div>
      </div>

      <label>타겟 동기 <span class="hint">(콤마)</span></label>
      <input name="target_motivation" value="자기표현" />

      <label>현재 채널 <span class="hint">(콤마)</span></label>
      <input name="current_channels" value="인스타그램, 유튜브" />

      <label>브랜드 채널 URL</label>
      <input name="brand_channel_url" value="https://www.youtube.com/@hince_official" />

      <div class="row">
        <div>
          <label>캠페인 KPI</label>
          <input name="campaign_kpi" value="재구매 유도" />
        </div>
        <div>
          <label>캠페인 기간</label>
          <input name="campaign_period" value="한달" />
        </div>
      </div>

      <div class="row">
        <div>
          <label>예산</label>
          <input name="campaign_budget" value="200~500만원" />
        </div>
        <div>
          <label>매체 채널 <span class="hint">(콤마)</span></label>
          <input name="media_channels" value="유튜브" />
        </div>
      </div>

      <label>경쟁사 <span class="hint">(콤마, 선택)</span></label>
      <input name="competitors" value="" />

      <button type="submit" id="btn">실행하기 →</button>
    </form>

    <div id="status">
      <div class="bar"><span class="spin"></span><span id="msg">파이프라인 실행 중… 트렌드 수집(실제 API)은 몇 분 걸려요. 창을 닫지 마세요.</span></div>
      <pre id="log" style="display:none"></pre>
    </div>
  </div>
</div>

<script>
const form = document.getElementById("f");
const btn = document.getElementById("btn");
const statusBox = document.getElementById("status");
const msg = document.getElementById("msg");
const logEl = document.getElementById("log");

form.addEventListener("submit", async (e) => {
  e.preventDefault();
  const data = Object.fromEntries(new FormData(form).entries());

  btn.disabled = true;
  btn.textContent = "실행 중…";
  statusBox.style.display = "block";

  try {
    const res = await fetch("/run", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify(data)
    });
    const json = await res.json();

    if (json.ok) {
      msg.textContent = "완료! 결과 화면으로 이동합니다…";
      location.href = "/web/result.html";
    } else {
      msg.textContent = "❌ 실행 중 오류가 났어요. 아래 로그를 확인하세요.";
      logEl.style.display = "block";
      logEl.textContent = json.log || json.error || "(로그 없음)";
      btn.disabled = false;
      btn.textContent = "다시 실행하기 →";
    }
  } catch (err) {
    msg.textContent = "❌ 서버 연결 실패: " + err;
    btn.disabled = false;
    btn.textContent = "다시 실행하기 →";
  }
});
</script>
</body>
</html>
