<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>입력 정보 확인 — 미리보기</title>
<link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
<style>
    :root {
        --text-primary: #4a424a;
        --text-secondary: #7e6b7e;
        --card-white: rgba(255, 255, 255, 0.85);
        --radius-lg: 48px;
        --radius-md: 24px;
        --bg: #fffbf9;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
        background-color: var(--bg);
        color: var(--text-primary);
        font-family: 'Pretendard', sans-serif;
        min-height: 100vh;
        display: flex; align-items: center; justify-content: center;
        padding: 40px 20px;
    }

    /* 배경 앰비언트 블롭 */
    .ambient-layer { position: fixed; inset: 0; z-index: -1; overflow: hidden; pointer-events: none; }
    .blob { position: absolute; border-radius: 50%; filter: blur(80px); opacity: 0.4; mix-blend-mode: multiply; }
    .blob-1 { width: 600px; height: 600px; background: #ffd1dc; top: -100px; left: -100px; }
    .blob-2 { width: 520px; height: 520px; background: #e0d4ff; bottom: -120px; right: -80px; }

    .form-card {
        background: var(--card-white);
        backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
        border: 1px solid rgba(255, 255, 255, 0.8);
        border-radius: var(--radius-lg);
        padding: 64px; max-width: 1180px; width: 100%;
        box-shadow: 0 20px 60px rgba(230, 230, 250, 0.15);
    }
    .step-header { text-align: center; margin-bottom: 36px; }
    .step-title { font-size: 2rem; font-weight: 800; letter-spacing: -0.03em; margin-bottom: 8px; color: var(--text-primary); }
    .step-desc { font-size: 1.1rem; color: var(--text-secondary); }

    /* ── Confirm card page (3D 커버플로우) ── */
    .cf-viewport { position: relative; height: 380px; margin-bottom: 24px; perspective: 1600px; }
    .cf-stage { position: relative; width: 100%; height: 100%; transform-style: preserve-3d; }
    .cf-card {
        position: absolute; top: 0; left: 50%;
        width: 380px; height: 360px; margin-left: -190px;
        background: rgba(255, 255, 255, 0.85);
        backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
        border: 1px solid rgba(255, 255, 255, 0.8);
        border-radius: var(--radius-md);
        padding: 0; overflow: hidden;
        display: flex; flex-direction: column;
        box-shadow: 0 24px 60px rgba(126, 107, 126, 0.14);
        transition: transform 0.55s cubic-bezier(.2,.7,.2,1), opacity 0.55s ease, box-shadow 0.4s ease;
        will-change: transform, opacity;
        cursor: pointer; user-select: none;
    }
    .cf-card.cf-active { cursor: default; }
    .cf-nav { display: flex; align-items: center; justify-content: center; gap: 20px; margin-bottom: 32px; }
    .cf-arrow {
        width: 44px; height: 44px; border-radius: 50%;
        border: 1px solid rgba(126, 107, 126, 0.2);
        background: rgba(255, 255, 255, 0.7);
        color: var(--text-secondary); font-size: 1.1rem; cursor: pointer;
        display: flex; align-items: center; justify-content: center;
        transition: background 0.2s, color 0.2s, transform 0.15s;
    }
    .cf-arrow:hover { background: #fff; color: var(--text-primary); }
    .cf-arrow:active { transform: scale(0.92); }
    .cf-arrow:disabled { opacity: 0.35; cursor: default; }
    .cf-dots { display: flex; gap: 9px; }
    .cf-dot {
        width: 9px; height: 9px; padding: 0; border: none; border-radius: 50%;
        background: rgba(126, 107, 126, 0.25); cursor: pointer;
        transition: background 0.25s, transform 0.25s;
    }
    .cf-dot.on { background: #bca0bc; transform: scale(1.25); }

    .confirm-section-title {
        background: linear-gradient(135deg, #fbe3ee, #ece2fa);
        color: #8a6aa8;
        font-size: 0.95rem; font-weight: 650; letter-spacing: -0.02em;
        padding: 15px 28px; margin: 0;
    }
    .cf-card > div[id^="confirm-"] {
        flex: 1; display: flex; flex-direction: column; justify-content: center;
        padding: 8px 28px 20px;
    }
    .confirm-row {
        display: flex; justify-content: space-between; align-items: flex-start;
        gap: 12px; padding: 10px 0;
        border-bottom: 1px solid rgba(126, 107, 126, 0.08);
        font-size: 0.92rem;
    }
    .confirm-row:last-child { border-bottom: none; }
    .confirm-label { color: var(--text-secondary); font-weight: 500; flex-shrink: 0; min-width: 78px; }
    .confirm-value { color: var(--text-secondary); font-weight: 500; text-align: right; word-break: break-word; }
    .confirm-value.muted { color: var(--text-secondary); font-weight: 400; opacity: 0.6; }

    @media (max-width: 900px) {
        .cf-viewport { height: auto; perspective: none; }
        .cf-stage { transform-style: flat; }
        .cf-card {
            position: relative; left: auto; top: auto; margin: 0 auto 16px;
            width: 100%; max-width: 420px; height: auto;
            transform: none !important; opacity: 1 !important;
        }
        .cf-nav { display: none; }
        .form-card { padding: 40px 24px; }
    }
    @media (prefers-reduced-motion: reduce) { .cf-card { transition: none; } }

    .submit-row { display: flex; align-items: center; justify-content: space-between; }
    .back-button { background: none; border: none; color: var(--text-secondary); font-size: 1rem; font-weight: 600; cursor: pointer; font-family: inherit; }
    .cta-button { border: none; border-radius: 100px; padding: 14px 28px; background: linear-gradient(135deg, #c9b6f0, #f0a6c4); color: #fff; font-size: 1rem; font-weight: 700; cursor: pointer; box-shadow: 0 8px 22px rgba(201,182,240,0.5); font-family: inherit; }
</style>
</head>
<body>
    <div class="ambient-layer"><div class="blob blob-1"></div><div class="blob blob-2"></div></div>

    <div class="form-card">
        <div class="step-header">
            <h2 class="step-title">입력 정보 확인</h2>
            <p class="step-desc">트렌드 매칭 시작 전, 입력한 내용을 한 번 더 확인해 주세요</p>
        </div>

        <div class="cf-viewport">
            <div class="cf-stage" id="cf-stage">
                <div class="cf-card" data-cf="0">
                    <div class="confirm-section-title">브랜드 정보</div>
                    <div id="confirm-brand"></div>
                </div>
                <div class="cf-card" data-cf="1">
                    <div class="confirm-section-title">프로젝트 정보</div>
                    <div id="confirm-project"></div>
                </div>
                <div class="cf-card" data-cf="2">
                    <div class="confirm-section-title">캠페인 정보</div>
                    <div id="confirm-campaign"></div>
                </div>
            </div>
        </div>
        <div class="cf-nav">
            <button type="button" class="cf-arrow" id="cf-prev" aria-label="이전 카드">←</button>
            <div class="cf-dots" id="cf-dots"></div>
            <button type="button" class="cf-arrow" id="cf-next" aria-label="다음 카드">→</button>
        </div>

        <div class="submit-row">
            <button class="back-button">← 수정하기</button>
            <button class="cta-button">트렌드 매칭 시작 ✨</button>
        </div>
    </div>

<script>
    /* ===== 샘플 입력 데이터 (실제 화면에선 폼 입력값이 들어감) ===== */
    const sample = {
        brand_name: '글로우랩',
        current_channels: ['인스타그램', '유튜브'],
        target: { gender: '여성', age_groups: ['20대', '30대'], involvement: '중', motivation: ['성분', '가격'] },
        tone_and_manner: ['클린뷰티'],
        product_name: '수분진정크림',
        category: '스킨케어',
        texture_keywords: ['촉촉', '산뜻'],
        campaign_kpi: '신제품 인지도',
        campaign_period: '6주',
        campaign_budget: '1000만원',
        media_channels: ['인스타그램'],
        brand_channel_url: [],
        competitors: ['A사', 'B사']
    };

    function renderConfirm(d) {
        const fmt = v => Array.isArray(v) ? (v.length ? v.join(', ') : '–') : (v || '–');
        const rows = arr => arr.map(([k, v]) => {
            const empty = !v || v === '–';
            return `<div class="confirm-row"><div class="confirm-label">${k}</div><div class="confirm-value ${empty ? 'muted' : ''}">${empty ? '–' : v}</div></div>`;
        }).join('');
        document.getElementById('confirm-brand').innerHTML = rows([
            ['브랜드명', d.brand_name], ['활용 매체', fmt(d.current_channels)],
            ['타겟 성별', d.target.gender], ['타겟 연령', fmt(d.target.age_groups)],
            ['톤앤매너', fmt(d.tone_and_manner)]
        ]);
        document.getElementById('confirm-project').innerHTML = rows([
            ['제품명', d.product_name], ['카테고리', d.category],
            ['제품 특징', fmt(d.texture_keywords)], ['뷰티 관여도', d.target.involvement],
            ['소비 동기', fmt(d.target.motivation)]
        ]);
        document.getElementById('confirm-campaign').innerHTML = rows([
            ['KPI', d.campaign_kpi], ['기간', d.campaign_period], ['예산', d.campaign_budget],
            ['주력 채널', fmt(d.media_channels)], ['URL', fmt(d.brand_channel_url)],
            ['경쟁사', fmt(d.competitors)]
        ]);
        cfSetup(); cfActive = 0; cfLayout();
    }

    /* ── 입력 확인 카드 3D 커버플로우 ── */
    let cfActive = 0;
    let cfReady = false;
    function cfLayout() {
        const stage = document.getElementById('cf-stage');
        if (!stage) return;
        const cards = stage.querySelectorAll('.cf-card');
        if (window.matchMedia('(max-width: 900px)').matches) {
            cards.forEach((card) => {
                card.style.width = ''; card.style.marginLeft = ''; card.style.transform = '';
                card.style.opacity = ''; card.style.zIndex = ''; card.style.pointerEvents = '';
                card.classList.toggle('cf-active', false);
            });
            document.querySelectorAll('#cf-dots .cf-dot').forEach((dot, i) => dot.classList.toggle('on', i === cfActive));
            return;
        }
        const sw = stage.clientWidth || 900;
        const cardW = Math.max(330, Math.min(400, sw * 0.45));
        const gap = Math.max(120, Math.min(190, sw * 0.16));
        cards.forEach((card, i) => {
            card.style.width = cardW + 'px';
            card.style.marginLeft = (-cardW / 2) + 'px';
            const off = i - cfActive;
            const x = off * gap;
            const z = Math.abs(off) * -240;
            const ry = off * -42;
            const sc = off === 0 ? 1 : 0.86;
            card.style.transform = `translateX(${x}px) translateZ(${z}px) rotateY(${ry}deg) scale(${sc})`;
            card.style.opacity = Math.abs(off) > 1 ? '0' : (off === 0 ? '1' : '0.5');
            card.style.zIndex = String(10 - Math.abs(off));
            card.style.pointerEvents = Math.abs(off) > 1 ? 'none' : 'auto';
            card.classList.toggle('cf-active', off === 0);
        });
        document.querySelectorAll('#cf-dots .cf-dot').forEach((dot, i) => dot.classList.toggle('on', i === cfActive));
        const n = cards.length;
        const prev = document.getElementById('cf-prev');
        const next = document.getElementById('cf-next');
        if (prev) prev.disabled = cfActive === 0;
        if (next) next.disabled = cfActive === n - 1;
    }
    function cfGo(i) {
        const n = document.querySelectorAll('#cf-stage .cf-card').length;
        cfActive = Math.max(0, Math.min(n - 1, i));
        cfLayout();
    }
    function cfSetup() {
        if (cfReady) return;
        cfReady = true;
        const stage = document.getElementById('cf-stage');
        if (!stage) return;
        document.getElementById('cf-prev').addEventListener('click', () => cfGo(cfActive - 1));
        document.getElementById('cf-next').addEventListener('click', () => cfGo(cfActive + 1));
        const cards = stage.querySelectorAll('.cf-card');
        const dotsWrap = document.getElementById('cf-dots');
        cards.forEach((card, i) => {
            card.addEventListener('click', () => { if (i !== cfActive) cfGo(i); });
            const dot = document.createElement('button');
            dot.type = 'button'; dot.className = 'cf-dot';
            dot.setAttribute('aria-label', (i + 1) + '번 카드 보기');
            dot.addEventListener('click', () => cfGo(i));
            dotsWrap.appendChild(dot);
        });
        let startX = 0, dragging = false;
        stage.addEventListener('pointerdown', (e) => { dragging = true; startX = e.clientX; });
        window.addEventListener('pointerup', (e) => {
            if (!dragging) return;
            dragging = false;
            const dx = e.clientX - startX;
            if (dx > 40) cfGo(cfActive - 1);
            else if (dx < -40) cfGo(cfActive + 1);
        });
        document.addEventListener('keydown', (e) => {
            if (e.key === 'ArrowLeft') cfGo(cfActive - 1);
            if (e.key === 'ArrowRight') cfGo(cfActive + 1);
        });
        let wLock = false, wAcc = 0;
        stage.addEventListener('wheel', (e) => {
            if (Math.abs(e.deltaX) <= Math.abs(e.deltaY)) return;
            e.preventDefault();
            if (wLock) return;
            wAcc += e.deltaX;
            if (Math.abs(wAcc) > 40) {
                cfGo(cfActive + (wAcc > 0 ? 1 : -1));
                wAcc = 0; wLock = true;
                setTimeout(() => { wLock = false; }, 450);
            }
        }, { passive: false });
        window.addEventListener('resize', cfLayout);
    }

    renderConfirm(sample);
</script>
</body>
</html>
