<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>match-report 컴포넌트 미리보기 (디자이너용)</title>

<!-- 전역 폰트 (앱과 동일하게 Pretendard CDN — 컴포넌트는 이 폰트를 상속) -->
<link rel="stylesheet" as="style" crossorigin
  href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable.min.css" />

<!-- ⭐ 공유 컴포넌트 스타일 (단일 소스) -->
<link rel="stylesheet" href="../shared/components/match-report.css" />

<style>
  /* ── 이 아래는 '미리보기 페이지' 전용 (= 앱 역할 시뮬레이션). 컴포넌트와 무관 ── */
  body {
    margin: 0;
    font-family: "Pretendard Variable", Pretendard, -apple-system, system-ui, sans-serif;
    background: #fffbf9;
    color: #4a424a;
  }
  /* 앱의 페이지 컨테이너 = 스크롤 소유자 (UI 담당자: overflow-y:auto) */
  .preview-scroll {
    height: 100vh;
    overflow-y: auto;
  }
  /* 앱의 마운트 영역 = #page-step4 .form-card (max-width 1180px) 흉내 */
  .preview-form-card {
    max-width: 1180px;
    margin: 0 auto;
    padding: 32px 24px 80px;
  }
  .preview-banner {
    max-width: 1180px;
    margin: 0 auto 4px;
    padding: 14px 24px 0;
    font-size: 12.5px;
    color: #a899a8;
    line-height: 1.6;
  }
  .preview-banner b { color: #d98ba0; }
  .preview-width-toggle { margin-top: 6px; }
  .preview-width-toggle button {
    font: inherit; font-size: 12px; cursor: pointer;
    border: 1px solid #f0d8e4; background: #fff; color: #7e6b7e;
    border-radius: 6px; padding: 4px 10px; margin-right: 6px;
  }
  .preview-width-toggle button:hover { background: #fef0f5; }
</style>
</head>
<body>
  <div class="preview-scroll">
    <div class="preview-banner">
      <b>match-report 컴포넌트 미리보기</b> — 이 페이지는 "앱(UI)" 역할을 흉내냅니다.
      바깥 컨테이너가 스크롤을 소유하고(<code>overflow-y:auto</code>), 컴포넌트는 그 안에서 내용만 흐릅니다(이중 스크롤 없음).
      <div class="preview-width-toggle">
        마운트 폭 테스트:
        <button data-w="1180">1180px (앱 기본)</button>
        <button data-w="768">768px (태블릿)</button>
        <button data-w="390">390px (모바일)</button>
      </div>
    </div>

    <!-- ⭐ 앱이 컴포넌트를 마운트하는 자리 -->
    <div class="preview-form-card">
      <div id="match-report-mount"></div>
    </div>
  </div>

  <!-- ⭐ 공유 컴포넌트 스크립트 (단일 소스) -->
  <script src="../shared/components/match-report.js"></script>
  <script>
    // ── 앱 역할: 데이터를 '이미 파싱된 객체'로 준비해서 컴포넌트에 주입 ──
    // (실제 앱은 fetch('/output-main/output-text/writer-output.json') 로 받지만,
    //  미리보기는 더블클릭만으로 보이도록 writer-output.example.json 의 data 를 인라인)
    var SAMPLE_DATA = {
      brand: {
        name: "힌스 (hince)",
        product_name: "커버 마스터 핑크 쿠션",
        category: "메이크업 > 베이스",
        target_display: "20대 여성 · Z세대·트렌디"
      },
      contents: [
        {
          trend_name: "매트 쿠션의 부상",
          rank: 1,
          verdict: "1순위",
          display_variant: "primary",
          keywords: ["매트 쿠션", "세미매트", "결 살아있는", "라네즈 네오 쿠션", "자연 매트"],
          headline_metric: { metric: "검색량 지수", value: "47.4", delta: "+22%" },
          metrics: { score: 92, growth_rate: 22, period: "26.01-05" },
          summary_bullets: [
            "글래스 스킨이나 과도한 광택보다 자연스럽고 얇은 레이어의 매트한 피부 표현이 2026년 핵심 트렌드로 떠올랐다. 매트와 글로우의 대비를 이용한 밸런스 잡힌 베이스 메이크업이 새로운 기준으로 자리 잡고 있다.",
            "매트 쿠션 검색 관심도가 2026년 1월 38.9에서 5월 47.4로 22% 상승했으며, 라네즈 네오 쿠션 더 매트 등 신제품 출시로 시장이 활성화 중이다.",
            "20대 여성층을 중심으로 '너무 매끈한' 베이스보다 '피부 결이 살아있는' 매트 마무리를 선호하는 경향이 확대되고 있다."
          ],
          reason_bullets: [
            "브랜드 제형 '매트'와 트렌드 키워드 '매트쿠션' 직결로 제품-트렌드 일치도 높음",
            "Z세대·트렌디 톤의 '피부 결이 살아있는' 자연스러운 표현이 브랜드 정체성과 완벽 부합",
            "20대 여성의 자기표현 동기와 '새로운 기준' 트렌드 수용 성향 일치"
          ],
          evidence: [
            { source: "naver_datalab", label: "Naver Datalab", description: "검색량 지수 (2026-01 ~ 2026-05) → 매트쿠션 47.4 (5월), 커버쿠션·세미매트쿠션 함께 트렌드", url: "https://datalab.naver.com/" },
            { source: "instagram", label: "Instagram", description: "관련 콘텐츠 (최근 30일) → 라네즈 네오 쿠션 더 매트, 어바웃톤 디자인 멀티 팔레트 등 신상품 언급 다수", url: null },
            { source: "tavily", label: "Tavily", description: "업계 분석 (2026년) → 2026 뷰티 트렌드 보고서에서 '매트와 글로의 대비'를 메이크업의 새로운 균형으로 명시", url: "https://tavily.com/" }
          ]
        },
        {
          trend_name: "최소 레이어 베이스의 '얇고 정밀한' 철학",
          rank: 2,
          verdict: "2순위",
          display_variant: "primary",
          keywords: ["밀착", "최소 레이어", "얇은 레이어", "피붓결 정리", "미니멀 베이스"],
          headline_metric: { metric: "효능 키워드 1위", value: "밀착", delta: "" },
          metrics: { score: 78, growth_rate: 14, period: "26.01-05" },
          summary_bullets: [
            "2026년 베이스 메이크업의 가장 큰 철학적 변화는 '완벽함'에서 '자연스러움'으로의 전환이다. 피부 자체를 커버하는 것이 아니라 피붓결만 정리하는 얇은 레이어가 새로운 기준이 되었다.",
            "올리브영 베이스 메이크업 키워드 분석에서 '밀착'이 상위 키워드로 강조되고 있으며, 20대 대상 가이드에서 최소 3~4가지 제품 조합이 권장되고 있다."
          ],
          reason_bullets: [
            "Z세대·트렌디의 '자연스러움·미니멀·효율' 가치와 '최소 레이어·얇은 철학' 완벽 공명",
            "브랜드 제형 '매트'가 '얇은 레이어·밀착' 트렌드와 제품 특성 차원에서 자연스럽게 조화",
            "20대 자기표현의 '나다움을 가장 효율적으로 표현'하려는 동기와 '최소템 철학' 정확히 일치"
          ],
          evidence: [
            { source: "naver_datalab", label: "Naver DataLab", description: "효능 키워드 (2026년 1분기) → 베이스 제품 리뷰: 밀착(효능 1위), 촉촉하게·수분·지속 등 선호", url: "https://datalab.naver.com/" },
            { source: "tavily", label: "Tavily", description: "트렌드 분석 (2026년) → 베이스는 완벽한 커버보다 피붓결만 정리한 얇은 레이어가 기준", url: "https://tavily.com/" }
          ]
        },
        {
          trend_name: "웰니스 뷰티 기반의 스킨케어형 베이스",
          rank: 3,
          verdict: "3순위",
          display_variant: "supplementary",
          keywords: ["PDRN", "펩타이드", "세럼 프라이머", "하이브리드 포뮬러", "피부 회복"],
          headline_metric: { metric: "핵심 성분", value: "PDRN · 펩타이드", delta: "" },
          metrics: { score: 54, growth_rate: 9, period: "26.01-05" },
          summary_bullets: [
            "2026년 뷰티 시장의 핵심 축이 '완벽한 커버'에서 '피부 회복'으로 이동했다. 메이크업이 피부 부담이 아닌 컨디션 유지 단계로 재해석되면서 세럼 프라이머·PDRN 베이스 등 기능성 하이브리드 포뮬러가 확산 중이다.",
            "PDRN, NAD, 펩타이드, 레티날 등 바이오 기술 성분이 베이스 메이크업에 적극 채용되고 있다."
          ],
          reason_bullets: [
            "Z세대·트렌디 톤과 과학적·기능성 강조 트렌드 간 톤앤매너 충돌",
            "트렌드 키워드가 PDRN·펩타이드 등 성분 중심으로 학술적이어서 브랜드 제형 키워드와 무관",
            "20대 자기표현 동기보다 피부 회복·관리 니즈 중심 트렌드로 페르소나 일치도 낮음"
          ],
          evidence: [
            { source: "tavily", label: "Tavily", description: "트렌드 분석 (2026년) → 파운데이션·쿠션에 스킨케어 성분 담는 흐름이 기본화, 하이브리드 포뮬러 증가", url: "https://tavily.com/" },
            { source: "tavily", label: "Tavily", description: "성분 트렌드 (2026년) → PDRN, NAD, 펩타이드 등 바이오 성분이 핵심 축으로 부상", url: "https://tavily.com/" }
          ]
        }
      ]
    };

    // 컴포넌트 호출 (앱이 하는 그대로)
    renderMatchReport(document.getElementById("match-report-mount"), SAMPLE_DATA);

    // 폭 테스트 버튼 (비율 검증용)
    document.querySelectorAll(".preview-width-toggle button").forEach(function (btn) {
      btn.addEventListener("click", function () {
        document.querySelector(".preview-form-card").style.maxWidth = btn.dataset.w + "px";
      });
    });
  </script>
</body>
</html>
