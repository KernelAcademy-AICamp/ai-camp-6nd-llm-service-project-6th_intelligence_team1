name: Secret Protection

on:
  push:
  pull_request:

jobs:
  check:
    name: Verify no secrets exposed
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Verify .env is in .gitignore
        run: |
          if ! git check-ignore -q .env; then
            echo "::error file=.gitignore::.env가 .gitignore에 포함되어 있지 않습니다 — 시크릿 노출 위험"
            echo ""
            echo "복구 방법: .gitignore 최상단에 다음 줄 추가"
            echo "  .env"
            exit 1
          fi
          echo ".env는 정상적으로 gitignore됨"

      - name: Verify env files are not tracked
        run: |
          TRACKED=$(git ls-files | grep -E '(^|/)\.env(\..*)?$' || true)
          if [ -n "$TRACKED" ]; then
            echo "::error::다음 환경 파일이 깃에 추적되고 있습니다:"
            echo "$TRACKED"
            echo ""
            echo "복구 방법:"
            echo "  git rm --cached <파일명>"
            echo "  git commit -m 'remove tracked env file'"
            exit 1
          fi
          echo ".env 계열 파일이 추적되지 않음"

      - name: Scan for secret patterns in tracked files
        run: |
          PATTERNS='sk-[a-zA-Z0-9_-]{20,}|sk-ant-[a-zA-Z0-9_-]{20,}|sb_secret_[a-zA-Z0-9_-]+|AKIA[0-9A-Z]{16}|ghp_[a-zA-Z0-9]{36}|gho_[a-zA-Z0-9]{36}|ghs_[a-zA-Z0-9]{36}|xox[baprs]-[a-zA-Z0-9-]+'
          MATCHES=$(git grep -nE "$PATTERNS" -- ':!.github/workflows/*' || true)
          if [ -n "$MATCHES" ]; then
            echo "::error::추적되는 파일에서 시크릿 패턴 발견:"
            echo "$MATCHES"
            echo ""
            echo "즉시 해당 키를 로테이션하고 파일에서 제거하세요."
            exit 1
          fi
          echo "추적 파일에서 시크릿 패턴 미발견"

